<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBower — SMSBower Kembaran Hayuk1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(22, 22, 50, 0.8);
            --border: rgba(99, 102, 241, 0.2);
            --accent: #6366f1;
            --cyan: #06b6d4;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-bright: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        input { width: 100%; padding: 14px 18px; background: rgba(15, 15, 35, 0.8); border: 1px solid var(--border); border-radius: 12px; color: var(--text-bright); outline: none; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
        .btn { padding: 14px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; }
        .btn-success { background: linear-gradient(135deg, var(--green), #34d399); color: white; width: 100%; height: 55px; font-size: 16px; }
        .btn-danger { background: linear-gradient(135deg, var(--red), #f87171); color: white; width: 100%; height: 55px; font-size: 16px; }
        .btn-ghost { background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid var(--border); }
        
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align:center; }
        .country-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 20px 0; }
        .country-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .country-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.2); transform: translateY(-3px); }
        
        .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-left: 4px solid var(--accent); animation: slideIn 0.3s ease-out; }
        .order-card.done { border-left-color: var(--green); }
        .cc-code { color: var(--accent); font-weight: 900; font-size: 18px; cursor: pointer; }
        .phone-num { color: #fff; font-weight: 900; font-size: 18px; margin-left:8px; cursor: pointer; }
        .otp-box { background: rgba(16,185,129,0.2); color: var(--green); padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 26px; cursor:pointer; border: 1px solid var(--green); }
        
        .toast-box { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-card); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 8px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hidden { display: none !important; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #abStats { margin-top: 15px; padding: 15px; background: rgba(6,182,212,0.1); border: 1px solid var(--cyan); border-radius: 12px; font-weight:700; color:var(--cyan); text-align:center; display:flex; justify-content:space-around; }

        #oList { min-height: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1 style="font-size:24px;">🚀 WebBower (Hayuk Style)</h1>
        <div style="background:rgba(16,185,129,0.1); padding:10px 20px; border-radius:12px; border:1px solid var(--green)">
            <b id="balVal" style="color:var(--green); font-size:18px;">0.00</b> <span style="font-size:12px">USD</span>
            <button onclick="updateBalance()" style="background:none; border:none; cursor:pointer; color:var(--green); margin-left:10px; font-size:18px;">🔄</button>
        </div>
    </div>

    <div style="background:var(--bg-card); padding:20px; border-radius:16px; border:1px solid var(--border); display:flex; gap:10px; margin-bottom:24px;">
        <input type="password" id="apiInput" placeholder="Masukkan API Key SMSBower" style="margin-bottom:0" onchange="saveKey()">
        <button class="btn btn-primary" onclick="updateBalance()">Simpan Key</button>
    </div>

    <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:24px;">
        <div class="stat-card">Total<br><b id="statT" style="font-size:20px">0</b></div>
        <div class="stat-card" style="color:var(--green)">OTP<br><b id="statO" style="font-size:20px">0</b></div>
        <div class="stat-card" style="color:var(--yellow)">Wait<br><b id="statW" style="font-size:20px">0</b></div>
        <div class="stat-card" style="color:var(--red)">Cancel<br><b id="statC" style="font-size:20px">0</b></div>
    </div>

    <div class="country-grid" id="cGrid"></div>

    <div style="background:var(--bg-card); padding:24px; border-radius:20px; border:2px solid var(--accent); margin-bottom:24px;">
        <h3 id="selName" style="margin-bottom:16px; font-weight:800; font-size:20px;">🛒 Pilih Negara Dulu</h3>
        
        <div style="margin-bottom: 20px;">
            <label style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: block;">Max Price ($):</label>
            <input type="number" id="maxPriceInput" value="1.0" step="0.01" style="width: 100px; padding: 8px; margin-bottom: 0;">
        </div>

        <div id="btnContainer" style="display:flex; gap:10px;">
            <button class="btn btn-success" id="btnA" onclick="toggleAutoBuy()" style="flex:1;">🚀 START BRUTAL</button>
        </div>
        <button class="btn btn-danger hidden" id="btnS" onclick="toggleAutoBuy()" style="width:100%;">🛑 STOP ACTION</button>
        
        <div id="abStats" class="hidden">
            <div><span style="font-size:12px; color:var(--text-dim); display:block;">Attempts</span><span id="abAtt">0</span></div>
            <div><span style="font-size:12px; color:var(--text-dim); display:block;">Found</span><span id="abFound" style="color:var(--green);">0</span></div>
            <div><span style="font-size:12px; color:var(--text-dim); display:block;">Speed</span><span id="abSpd">0</span>/s</div>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h3 style="font-size:16px; color:var(--accent);">📋 Antrean (Sedang Menunggu)</h3>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-ghost" style="padding:8px 16px; font-size:12px; color:var(--green); border-color:var(--green);" onclick="copyAllNumbers()">📋 Salin Semua Nomer</button>
        </div>
    </div>
    <div id="oList"></div>
</div>

<div class="toast-box" id="tBox"></div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbower_key') || '';
    let selCountry = 'vietnam';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };
    let counts = { t:0, o:0, w:0, c:0 };

    const COUNTRIES = {
        vietnam: { n: 'Vietnam', f: '🇻🇳', id: '10', code: '84', max: 0.2 },
        colombia: { n: 'Colombia', f: '🇨🇴', id: '33', code: '57', max: 0.2 },
        philipina: { n: 'Philipina', f: '🇵🇭', id: '4', code: '63', max: 0.2 },
        mexico: { n: 'Mexico', f: '🇲🇽', id: '54', code: '52', max: 1.0 },
        brazil: { n: 'Brazil', f: '🇧🇷', id: '73', code: '55', max: 0.5 }
    };

    // Init UI
    if (apiKey) document.getElementById('apiInput').value = apiKey;
    
    const cGrid = document.getElementById('cGrid');
    Object.entries(COUNTRIES).forEach(([k, v]) => {
        const d = document.createElement('div');
        d.className = `country-card ${k === selCountry ? 'selected' : ''}`;
        d.id = `card_${k}`;
        d.onclick = () => selectCountry(k);
        d.innerHTML = `<div style="font-size:24px">${v.f}</div><div style="font-size:14px; font-weight:700">${v.n}</div>`;
        cGrid.appendChild(d);
    });

    function selectCountry(k) {
        selCountry = k;
        document.querySelectorAll('.country-card').forEach(x => x.classList.remove('selected'));
        document.getElementById(`card_${k}`).classList.add('selected');
        document.getElementById('selName').innerText = `🛒 Nembak Nomor ${COUNTRIES[k].n}`;
        document.getElementById('maxPriceInput').value = COUNTRIES[k].max;
    }
    selectCountry('vietnam');

    function saveKey() {
        apiKey = document.getElementById('apiInput').value.trim();
        localStorage.setItem('webbower_key', apiKey);
        toast('✅ API Key Disimpan!');
        updateBalance();
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            return await r.text();
        } catch (e) { return 'ERR_HTTP'; }
    }

    async function updateBalance() {
        const res = await reqApi('getBalance');
        if (res && res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balVal').innerText = b;
        }
    }

    function toggleAutoBuy() {
        if (!apiKey) { toast('❌ Masukkan API Key dulu!'); return; }
        isRunning = !isRunning;
        
        const btnA = document.getElementById('btnA');
        const btnS = document.getElementById('btnS');
        const abStats = document.getElementById('abStats');

        if (isRunning) {
            btnA.classList.add('hidden');
            btnS.classList.remove('hidden');
            abStats.classList.remove('hidden');
            stats = { att: 0, found: 0, startTime: Date.now() };
            toast('🔥 Mode Brutal Aktif!');
            startWorker();
        } else {
            btnA.classList.remove('hidden');
            btnS.classList.add('hidden');
            toast('🛑 Mode Brutal Berhenti.');
        }
    }

    async function startWorker() {
        while (isRunning) {
            stats.att++;
            updateStatsUi();
            
            const c = COUNTRIES[selCountry];
            const maxP = document.getElementById('maxPriceInput').value;
            
            try {
                const res = await reqApi('getNumber', { service: 'wa', country: c.id, maxPrice: maxP });
                if (res.includes('ACCESS_NUMBER')) {
                    const [_, id, num] = res.split(':');
                    stats.found++;
                    addOrder(id, num, c.code, maxP);
                } else if (res.includes('NO_BALANCE')) {
                    isRunning = false;
                    toggleAutoBuy();
                    alert('💸 SALDO HABIS!');
                    break;
                }
            } catch(e) {}
            
            // Jeda sedikit biar gak kena limit Cloudflare/API tapi tetep ngebut
            await new Promise(r => setTimeout(r, 50)); 
        }
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('abAtt').innerText = stats.att;
        document.getElementById('abFound').innerText = stats.found;
        document.getElementById('abSpd').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    function addOrder(id, num, code, price) {
        const o = { id, number: num, code, price, status: 'waiting', otp: '', time: Date.now() / 1000 };
        orders.push(o);
        counts.t++; counts.w++;
        updateCounters();
        renderOrder(o);
    }

    function renderOrder(d) {
        const list = document.getElementById('oList');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.id = `order_${d.id}`;
        
        // Bersihkan nomor dari country code (seperti hayuk1)
        let body = d.number;
        if(body.startsWith(d.code)) body = body.slice(d.code.length);

        card.innerHTML = `
            <div style="display:flex; align-items:center;">
                <span class="cc-code" onclick="copy('${d.code}')">${d.code}</span>
                <span class="phone-num" onclick="copy('${body}')">${body}</span>
                <div style="margin-left:15px; font-size:12px; color:var(--text-dim);">💰 <b>${d.price}</b></div>
            </div>
            <div id="meta_${d.id}" style="text-align:right;">
                <div id="time_${d.id}" style="font-size:13px; color:var(--yellow)">20:00</div>
                <button class="btn btn-ghost" style="padding:4px 8px; font-size:11px; margin-top:5px; color:var(--red); border-color:var(--red);" id="can_${d.id}" onclick="cancelOrder('${d.id}')">✕ Cancel</button>
            </div>
        `;
        list.prepend(card);
        startTimer(d.id, d.time);
    }

    function startTimer(id, st) {
        const interval = setInterval(() => {
            const el = (Date.now() / 1000) - st;
            const rem = 1200 - el;
            if (rem <= 0) { clearInterval(interval); return; }
            const tEl = document.getElementById(`time_${id}`);
            if (tEl) tEl.innerText = `${Math.floor(rem / 60)}:${Math.floor(rem % 60).toString().padStart(2, '0')}`;
        }, 1000);
    }

    async function cancelOrder(id) {
        // SMSBower setStatus 8 = Cancel
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res.includes('ACCESS_CANCEL')) {
            const card = document.getElementById(`order_${id}`);
            if (card) {
                card.style.opacity = '0.3';
                card.querySelector('#meta_' + id).innerHTML = `<span style="color:var(--red); font-size:12px; font-weight:900;">CANCELLED</span>`;
                counts.w--; counts.c++;
                updateCounters();
                setTimeout(() => card.remove(), 3000);
            }
            toast('🚫 Order Dibatalkan');
        } else {
            toast('⚠️ Tunggu 2 menit untuk cancel');
        }
    }

    // OTP POLLING (Persis Hayuk1)
    setInterval(async () => {
        const active = orders.filter(o => o.status === 'waiting');
        for (const o of active) {
            const res = await reqApi('getStatus', { id: o.id });
            if (res && res.includes('STATUS_OK')) {
                const otp = res.split(':')[1];
                o.status = 'done';
                o.otp = otp;
                counts.w--; counts.o++;
                updateCounters();
                
                const card = document.getElementById(`order_${o.id}`);
                if (card) {
                    card.classList.add('done');
                    const meta = card.querySelector('#meta_' + o.id);
                    meta.innerHTML = `<div class="otp-box" onclick="copy('${otp}')">${otp}</div>`;
                }
                playBeep();
                toast('🎉 OTP MASUK: ' + otp);
                // Set status 6 (Finish) di SMSBower
                reqApi('setStatus', { id: o.id, status: 6 });
            }
        }
    }, 5000);

    function updateCounters() {
        document.getElementById('statT').innerText = counts.t;
        document.getElementById('statO').innerText = counts.o;
        document.getElementById('statW').innerText = counts.w;
        document.getElementById('statC').innerText = counts.c;
    }

    function copy(t) { navigator.clipboard.writeText(t); toast(`📋 Copied: ${t}`); }
    function toast(m) { const x = document.createElement('div'); x.className='toast'; x.innerText=m; document.getElementById('tBox').appendChild(x); setTimeout(()=>x.remove(), 3000); }
    function playBeep() { try { const a=new (window.AudioContext || window.webkitAudioContext)(), o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, a.currentTime+1); } catch(e){} }

    function copyAllNumbers() {
        const nums = orders.filter(o => o.status === 'waiting').map(o => o.number).join('\n');
        if (!nums) return toast('❌ Tidak ada nomor aktif');
        navigator.clipboard.writeText(nums);
        toast('📋 Semua nomor disalin!');
    }

    // Auto Refresh Balance
    setInterval(updateBalance, 30000);
    if(apiKey) updateBalance();

</script>

</body>
</html>

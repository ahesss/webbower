<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBower — SMSBower Brutal Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141417;
            --accent: #bc13fe;
            --accent-glow: rgba(188, 19, 254, 0.4);
            --gold: #ffb700;
            --text: #e0e0e0;
            --text-dim: #909090;
            --success: #00ff88;
            --danger: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #200a2e 0%, transparent 50%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-card {
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .balance-card:hover { border-color: var(--accent); }
        .balance-card span { color: var(--gold); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        .api-section {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        .btn-stop { background: var(--danger); color: #fff; }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        select {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 10px;
            outline: none;
        }

        .stats-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }
        .stats-box p { display: flex; justify-content: space-between; }
        .stats-box span { color: var(--accent); font-weight: 600; }

        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .orders-container::-webkit-scrollbar { width: 4px; }
        .orders-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .order-item {
            background: var(--panel);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
            position: relative;
            overflow: hidden;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .order-info { display: flex; flex-direction: column; gap: 4px; }
        .order-num { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .order-meta { font-size: 12px; color: var(--text-dim); }
        
        .order-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .otp-badge {
            background: var(--success);
            color: #000;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); } 70% { box-shadow: 0 0 10px 10px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

        .btn-cancel {
            background: rgba(255, 62, 62, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 62, 62, 0.2);
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
        }
        .btn-cancel:hover { background: var(--danger); color: #fff; }

        .copy-all-btn {
            width: 100%;
            margin-bottom: 12px;
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
        }
        .copy-all-btn:hover { background: var(--accent); color: #fff; }

        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            transform: translateY(100px);
            transition: 0.3s;
            z-index: 1000;
        }
        .notif.show { transform: translateY(0); }

        .waiting-timer {
            font-size: 11px;
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">WEBBOWER V1</div>
        <div class="balance-card" id="balance-btn" onclick="updateBalance()">
            💰 <span id="balance-val">0.00</span> USD
        </div>
    </header>

    <div class="api-section">
        <input type="password" id="api-key" placeholder="Masukkan API Key SMSBower..." onchange="saveKey()">
        <button class="btn btn-primary" onclick="updateBalance()">CHECK</button>
    </div>

    <div class="main-grid">
        <div class="controls">
            <div class="card">
                <h3 style="margin-bottom: 15px; font-size: 16px; color: var(--accent);">TARGET CONFIG</h3>
                <label style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: block;">Pilih Negara:</label>
                <select id="country-select">
                    <option value="vietnam" data-id="10" data-code="84" data-max="0.2">Vietnam 🇻🇳</option>
                    <option value="colombia" data-id="33" data-code="57" data-max="0.2">Colombia 🇨🇴</option>
                    <option value="philipina" data-id="4" data-code="63" data-max="0.2">Philipina 🇵🇭</option>
                    <option value="mexico" data-id="54" data-code="52" data-max="0.25">Mexico 🇲🇽 (HOT)</option>
                    <option value="brazil" data-id="73" data-code="55" data-max="0.5">Brazil 🇧🇷</option>
                </select>

                <label style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: block;">Max Price ($):</label>
                <input type="number" id="max-price" value="0.25" step="0.01" style="width: 100%; margin-bottom: 15px;">

                <button id="start-btn" class="btn btn-primary" style="width: 100%;" onclick="toggleAutoBuy()">🚀 START BRUTAL BUY</button>
                
                <div class="stats-box" id="stats-ui" style="display: none;">
                    <p>Status: <span id="status-text" style="color: var(--success);">NGEBUT...</span></p>
                    <p>Attempts: <span id="stat-att">0</span></p>
                    <p>Dapat: <span id="stat-found">0</span></p>
                    <p>Speed: <span id="stat-speed">0.0</span>/s</p>
                </div>
            </div>

            <div class="card">
                <button class="btn copy-all-btn" onclick="copyAll()">📋 COPY SEMUA NOMOR</button>
                <div style="font-size: 11px; color: var(--text-dim); text-align: center;">Hanya menyalin nomor yang 'Waiting OTP'</div>
            </div>
        </div>

        <div class="orders-section">
            <div class="orders-container" id="orders-list">
                <!-- Orders appear here -->
                <div style="text-align: center; color: var(--text-dim); margin-top: 50px;">Belum ada nomor yang didapatkan.</div>
            </div>
        </div>
    </div>
</div>

<div class="notif" id="notif">Copied to clipboard!</div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbower_key') || '';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };
    let workers = [];

    if (apiKey) document.getElementById('api-key').value = apiKey;

    function saveKey() {
        apiKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('webbower_key', apiKey);
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            return await r.text();
        } catch (e) { return 'ERR_HTTP'; }
    }

    async function updateBalance() {
        saveKey();
        const res = await reqApi('getBalance');
        if (res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balance-val').innerText = b;
            showNotif('Balance Updated: $' + b);
        } else {
            showNotif('API Key Error / Invalid');
        }
    }

    function showNotif(txt) {
        const n = document.getElementById('notif');
        n.innerText = txt;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 2000);
    }

    function toggleAutoBuy() {
        if (!apiKey) { alert('Masukkan API Key dulu!'); return; }
        isRunning = !isRunning;
        const btn = document.getElementById('start-btn');
        const statsUi = document.getElementById('stats-ui');

        if (isRunning) {
            btn.innerText = '🛑 STOP AUTO BUY';
            btn.className = 'btn btn-stop';
            statsUi.style.display = 'block';
            resetStats();
            startBrutalWorkers();
        } else {
            btn.innerText = '🚀 START BRUTAL BUY';
            btn.className = 'btn btn-primary';
            // statsUi.style.display = 'none';
        }
    }

    function resetStats() {
        stats = { att: 0, found: 0, startTime: Date.now() };
        updateStatsUi();
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('stat-att').innerText = stats.att;
        document.getElementById('stat-found').innerText = stats.found;
        document.getElementById('stat-speed').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    // BRUTAL WORKERS (Multi-Thread Simulation with intervals)
    function startBrutalWorkers() {
        const countrySelect = document.getElementById('country-select');
        const countryId = countrySelect.options[countrySelect.selectedIndex].getAttribute('data-id');
        const countryCode = countrySelect.options[countrySelect.selectedIndex].getAttribute('data-code');
        const countryName = countrySelect.value;
        const maxPrice = document.getElementById('max-price').value;

        // Tembak 100 Request per detik (War Mode)
        const workerLoop = setInterval(async () => {
            if (!isRunning) { clearInterval(workerLoop); return; }
            
            stats.att++;
            if (stats.att % 10 === 0) updateStatsUi();

            // Selesaikan per request tanpa menunggu respon (Fire and forget style)
            doBuy(countryId, maxPrice, countryCode, countryName);
            
        }, 5); // Sangat cepat
    }

    async function doBuy(cId, mP, cCode, cName) {
        const res = await reqApi('getNumber', { service: 'wa', country: cId, maxPrice: mP });
        
        if (res.includes('ACCESS_NUMBER')) {
            const [_, id, num] = res.split(':');
            stats.found++;
            addOrder(id, num, cCode, cName, mP);
            updateStatsUi();
        } else if (res.includes('NO_BALANCE')) {
            isRunning = false;
            toggleAutoBuy();
            alert('SALDO HABIS!');
        }
    }

    function addOrder(id, num, code, country, price) {
        const order = { id, number: num, code, country, price, status: 'waiting', otp: '', time: Date.now() };
        orders.unshift(order); // Terbaru di atas
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if (orders.length === 0) {
            list.innerHTML = `<div style="text-align: center; color: var(--text-dim); margin-top: 50px;">Belum ada nomor yang didapatkan.</div>`;
            return;
        }

        list.innerHTML = orders.map(o => `
            <div class="order-item">
                <div class="order-info">
                    <div class="order-num">+${o.number}</div>
                    <div class="order-meta">${o.country.toUpperCase()} | $${o.price} | ID: ${o.id}</div>
                    ${o.status === 'waiting' ? `<div class="waiting-timer" id="timer-${o.id}">Pengecekan OTP...</div>` : ''}
                </div>
                <div class="order-status">
                    ${o.otp ? `<div class="otp-badge">${o.otp}</div>` : 
                      o.status === 'waiting' ? `<img src="https://i.gifer.com/ZZ5H.gif" width="20" style="filter: invert(1);">` : 
                      `<span style="color: var(--text-dim);">${o.status.toUpperCase()}</span>`}
                    
                    ${o.status === 'waiting' ? `<button class="btn btn-cancel" onclick="cancelOrder('${o.id}')">CANCEL</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    // OTP MONITORING (Polling every 10s for all orders)
    setInterval(async () => {
        const waiting = orders.filter(o => o.status === 'waiting');
        for (const o of waiting) {
            const res = await reqApi('getStatus', { id: o.id });
            if (res.includes('STATUS_OK')) {
                o.status = 'done';
                o.otp = res.split(':')[1];
                reqApi('setStatus', { id: o.id, status: 6 }); // Finish
                renderOrders();
                playNotif();
            } else if (res.includes('STATUS_CANCEL') || res.includes('STATUS_WAIT_RETRY')) {
                // Ignore wait_retry, just wait next loop
            }
            
            // Timeout check (20 mins)
            if ((Date.now() - o.time) > 1200000) {
                o.status = 'expired';
                renderOrders();
            }
        }
    }, 4000);

    async function cancelOrder(id) {
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res.includes('ACCESS_CANCEL')) {
            const o = orders.find(x => x.id === id);
            if (o) o.status = 'cancelled';
            renderOrders();
            showNotif('Order Dibatalkan. Saldo Kembali.');
        } else {
            showNotif('Belum bisa cancel (Min 2 menit)');
        }
    }

    function copyAll() {
        const toCopy = orders
            .filter(o => o.status === 'waiting' || o.otp !== '')
            .map(o => o.number + (o.otp ? ` | OTP: ${o.otp}` : ''))
            .join('\n');
        
        if (!toCopy) { showNotif('Tidak ada nomor untuk disalin.'); return; }
        
        navigator.clipboard.writeText(toCopy);
        showNotif('Semua Nomor Disalin!');
    }

    function playNotif() {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(e => {});
    }

    // Auto Refresh Balance every 1 min
    setInterval(() => { if (apiKey) updateBalance(); }, 60000);

</script>

</body>
</html>
